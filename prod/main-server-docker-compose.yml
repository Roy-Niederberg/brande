# -----------------------------------------------------------------------------|
# The man router compose file
# -----------------------------------------------------------------------------|
services:
  main-router:
    image:    registry.gitlab.com/rny3/brande/main_router:latest
    ports:    ["80:80", "443:443", "443:443/udp"]
    volumes:  [router_data:/data, router_config:/config, ./srv:/srv]
    secrets:  [cloudflare_api_token]

  facebook-dispatcher:
    image:    registry.gitlab.com/rny3/brande/facebook_dispatcher:latest
    secrets:  [fb_webhook_verify_token, fb_app_secret, fb_dispatcher_secret]
    volumes:  [./data/page_routes.json:/app/data/page_routes.json:ro]

  auth:
    image:    registry.gitlab.com/rny3/brande/auth:latest
    secrets:  [jwt_signing_key, google_oauth]

  landing-page:
    image:    registry.gitlab.com/rny3/brande/landing_page:latest

  landing-page-hebrew:
    image:    registry.gitlab.com/rny3/brande/landing_page_hebrew:latest

  client-onboarding:
    image:    registry.gitlab.com/rny3/brande/client_onboarding:latest
    # One 9-char [A-Z0-9] invite code per line, hand-edited on the VM.
    # Create the file before `up`. (Demo mode: codes gate the flow but are
    # not consumed — creation is manual since the scaffolding retirement.)
    volumes:  [./data/invite_codes.txt:/app/data/invite_codes.txt]

  facebook-signup:
    image:    registry.gitlab.com/rny3/brande/facebook_signup:latest
    secrets:  [fb_app_id, fb_app_secret]

volumes:
  router_data:
  router_config:

secrets:
  cloudflare_api_token:    {file: ./secrets/cloudflare_api_token.secret}
  fb_webhook_verify_token: {file: ./secrets/fb_webhook_verify_token.secret}
  fb_app_secret:           {file: ./secrets/fb_app_secret.secret}
  fb_app_id:               {file: ./secrets/fb_app_id.secret}
  fb_dispatcher_secret:    {file: ./secrets/fb_dispatcher_secret.secret}
  jwt_signing_key:         {file: ./secrets/jwt_signing_key.secret}
  google_oauth:            {file: ./secrets/google_oauth.secret}
