<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qabu - Coming Soon</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Rubik', sans-serif;
            background: radial-gradient(circle at center, #F8F9FA 0%, #A6D0DD 30%, #3276AA 100%);
            color: #fff;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 480px) {
            .logo {
                width: 140px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <img src="/logo_dark.svg" alt="Qabu" class="logo">
    <h1>Coming Soon</h1>
</body>
</html>
