<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qabû Bake-off Judge</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap"
      rel="stylesheet">
<style>
  :root { --blue:#85C1E9; --dark:#5D6D7E; --bg:#FAF4E8; --accent:#1B4F72 }
  * { box-sizing:border-box; margin:0 }
  body { font-family:'Heebo','Noto Sans Hebrew',Arial,sans-serif; background:var(--bg); color:var(--dark);
         padding:20px; max-width:900px; margin:0 auto }
  header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px }
  h1 { color:var(--accent); font-size:1.25rem }
  .idx { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:16px }
  .idx button { width:32px; height:32px; border:1px solid var(--blue); background:#fff;
                border-radius:6px; cursor:pointer; color:var(--dark) }
  .idx button.done { background:var(--blue) }
  .idx button.cur { outline:2px solid var(--accent) }
  .q { background:#fff; border:2px solid var(--blue); border-radius:12px; padding:14px 16px;
       margin-bottom:14px; font-weight:600; direction:rtl; font-size:1.05rem }
  .card { background:#fff; border:1px solid var(--blue); border-radius:12px;
          padding:12px 14px; margin-bottom:12px }
  .card .head { display:flex; justify-content:space-between; margin-bottom:6px }
  .letter { font-weight:700; color:var(--accent) }
  .model { color:var(--accent); font-weight:600; display:none }
  body.revealed .model { display:inline }
  .ans { white-space:pre-wrap; direction:rtl; line-height:1.5 }
  .stars { user-select:none; font-size:1.35rem; cursor:pointer; color:#c9c9c9;
           letter-spacing:.15em }
  .stars span.on { color:#e8a13c }
  nav { display:flex; gap:10px; justify-content:space-between; margin:16px 0 }
  .btn { background:var(--accent); color:#fff; border:0; border-radius:8px;
         padding:10px 18px; cursor:pointer; font-size:1rem }
  .btn:disabled { opacity:.45; cursor:not-allowed }
  .btn.sec { background:var(--dark) }
  table { border-collapse:collapse; background:#fff; width:100%; margin-top:10px }
  td,th { border:1px solid var(--blue); padding:8px 10px; text-align:left }
  #verdict { display:none; margin-bottom:20px }
  body.revealed #verdict { display:block }
  @media (max-width:600px) {
    body { padding:12px }
    .stars { font-size:1.8rem }
    nav { flex-wrap:wrap }
  }
</style>
</head>
<body>
<header><h1>Qabû Bake-off Judge</h1><div id="meta"></div></header>
<div class="idx" id="idx"></div>
<div id="verdict"><h1>Verdict</h1><div id="vtable"></div></div>
<div id="page"></div>
<nav>
  <button class="btn sec" id="prev">← Prev</button>
  <button class="btn sec" id="copy">Copy scores JSON</button>
  <button class="btn sec" id="reset">Start fresh</button>
  <button class="btn" id="reveal">Reveal & verdict</button>
  <button class="btn sec" id="next">Next →</button>
</nav>
<script>
const DATA = __DATA__
const KEY = `bakeoff-judge-${DATA.client}-${DATA.stamp}`
const state = JSON.parse(localStorage.getItem(KEY) || '{"scores":{},"revealed":false}')
const save = () => localStorage.setItem(KEY, JSON.stringify(state))
let cur = 0
const qs = DATA.questions
const judged = i => qs[i].answers.every(a => state.scores[`${i}:${a.model}`])

const el = (id) => document.getElementById(id)
document.body.classList.toggle('revealed', state.revealed)
el('meta').textContent = `${DATA.client} — ${DATA.stamp}`

function renderIdx() {
  el('idx').innerHTML = qs.map((_, i) =>
    `<button class="${judged(i) ? 'done' : ''} ${i === cur ? 'cur' : ''}"
       onclick="go(${i})">${i + 1}</button>`).join('')
  const left = qs.filter((_, i) => !judged(i)).length
  const r = el('reveal')
  r.disabled = !state.revealed && left > 0
  r.textContent = state.revealed ? 'Verdict' :
    left ? `Reveal (${left} left)` : 'Reveal & verdict'
}
function stars(i, a) {
  const s = state.scores[`${i}:${a.model}`] || 0
  return `<span class="stars">` + [1, 2, 3].map(n =>
    `<span class="${n <= s ? 'on' : ''}" onclick="score(${i},'${a.model}',${n})">★</span>`
  ).join('') + `</span>`
}
function render() {
  const q = qs[cur]
  el('page').innerHTML = `<div class="q">${cur + 1}. ${q.q}</div>` +
    q.answers.map(a => `<div class="card">
      <div class="head"><span><span class="letter">${a.letter}</span>
        <span class="model">— ${a.model} (${a.ms}ms)</span></span>${stars(cur, a)}</div>
      <div class="ans">${a.res.replace(/</g, '&lt;')}</div></div>`).join('')
  renderIdx()
}
window.go = i => { cur = i; render(); scrollTo(0, 0) }
window.score = (i, m, n) => { state.scores[`${i}:${m}`] = n; save(); render(); verdict() }
el('prev').onclick = () => go(Math.max(0, cur - 1))
el('next').onclick = () => go(Math.min(qs.length - 1, cur + 1))
el('copy').onclick = () => navigator.clipboard.writeText(JSON.stringify(state.scores))
  .then(() => alert('Scores copied — paste into a chat/file to share.'))
el('reset').onclick = () => {
  if (!confirm('Erase all stars and the reveal state for this file?')) return
  localStorage.removeItem(KEY); location.reload()
}

function verdict() {
  if (!state.revealed) return
  const models = {}
  qs.forEach((q, i) => q.answers.forEach(a => {
    const m = models[a.model] ??= { sum: 0, n: 0, ms: [] }
    m.ms.push(a.ms)
    const s = state.scores[`${i}:${a.model}`]
    if (s) { m.sum += s; m.n++ }
  }))
  const med = l => l.sort((x, y) => x - y)[l.length >> 1]
  el('vtable').innerHTML = '<table><tr><th>model</th><th>avg ★</th><th>rated</th>' +
    '<th>median ms</th></tr>' + Object.entries(models)
    .sort((a, b) => b[1].sum / (b[1].n || 1) - a[1].sum / (a[1].n || 1))
    .map(([name, m]) => `<tr><td>${name}</td><td>${m.n ? (m.sum / m.n).toFixed(2) : '—'}</td>
      <td>${m.n}/${qs.length}</td><td>${med(m.ms)}</td></tr>`).join('') + '</table>'
}
el('reveal').onclick = () => {
  if (qs.some((_, i) => !judged(i))) return // hard gate: no reveal before full rating
  state.revealed = true; save()
  document.body.classList.add('revealed'); verdict(); render(); scrollTo(0, 0)
}
render(); verdict()
</script>
</body>
</html>
