server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Drop PHP probes silently (bot scanners)
    location ~* \.php$ { return 444; }

    # Drop .git probes
    location ~ /\.git { return 444; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
