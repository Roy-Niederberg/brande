<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
        .overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: flex-end;
            flex-direction: column; gap: 60px; padding-bottom: 50px;
        }
        .overlay:empty { display: none; }
        .title { font-size: clamp(40px, 6vw, 100px); color: white; text-shadow: 3px 3px 8px rgba(0,0,0,0.7); text-align: center; }
        .social-links { display: flex; gap: 20px; }
        .social-links a { opacity: 0.9; transition: opacity 0.2s; }
        .social-links a:hover { opacity: 1; }
    </style>
</head>
<body>
    <img id="bg" src="" alt="">
    <div class="overlay" id="overlay"></div>
    <script src="loader.js"></script>
</body>
</html>
