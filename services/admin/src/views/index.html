<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        .container { width: 100%; height: 100vh; height: 100dvh; display: flex; }

        .site-section { flex: 1; height: 100%; position: relative; overflow: hidden; }
        .site-section > img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: flex-end;
            flex-direction: column; gap: 60px; padding-bottom: 50px;
        }
        .bg-overlay:empty { display: none; }

        .chat-section { flex: 1; min-width: 300px; display: flex; align-items: center; justify-content: center; }

        .title {
            font-size: clamp(40px, 6vw, 100px);
            color: white;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            text-align: center;
        }

        @keyframes qabu-spin { to { transform: rotate(360deg); } }
        #qabu-loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.15);
            transition: opacity 0.4s;
        }
        #qabu-loader svg {
            width: 80px; height: 80px;
            animation: qabu-spin 2s linear infinite;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }
        #qabu-loader.hide { opacity: 0; pointer-events: none; }

        @media (max-aspect-ratio: 1/1) {
            .container { position: relative; }
            .site-section { position: absolute; inset: 0; }
            .bg-overlay { display: none; }
            .chat-section { position: absolute; inset: 0; background: transparent; min-width: 0; }
        }
    </style>
</head>
<body>
    <div id="qabu-loader">
        <svg viewBox="-603 -603 1206 1206" xmlns="http://www.w3.org/2000/svg">
            <path fill="#fff" transform="rotate(135)" d="M -43.934 -600 L -43.934 0 C -102.948 -160.66 -102.944 -248.528 -175.736 -175.736 A 248.528 248.528 0 1 0 43.934 -244.614 L 43.934 -804.594 C 87.868 -512.132 248.528 -600 424.264 -424.264 A 600 600 0 1 1 -43.934 -600"/>
        </svg>
    </div>
    <div class="container">
        <div class="chat-section" id="chat-section"></div>
        <div class="site-section">
            <img id="bg-image" src="" alt="">
            <div class="bg-overlay" id="bg-overlay"></div>
        </div>
    </div>
    <script src="/admin/admin.js"></script>
    <script src="/admin/loader.js"></script>
</body>
</html>
