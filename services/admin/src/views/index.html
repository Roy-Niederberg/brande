<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="icon" href="data:,">
    {{httpInclude "/private/og-meta.html"}}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #fff; }
        .container { width: 100%; max-width: 130dvh; margin: 0 auto; height: 100vh; height: 100dvh; display: flex; }

        .site-section { flex: 1; height: 100%; position: relative; overflow: hidden; }
        .site-section > iframe { width: 100%; height: 100%; border: none; display: block; }

        .chat-section { flex: 1; min-width: 300px; display: flex; align-items: center; justify-content: center; }

        @keyframes qabu-spin { to { transform: rotate(360deg); } }
        #qabu-loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: #F8F9FA;
            transition: opacity 0.4s;
        }
        #qabu-loader svg { width: 80px; height: 80px; animation: qabu-spin 2s linear infinite; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
        #qabu-loader.hide { opacity: 0; pointer-events: none; }

        @media (min-aspect-ratio: 13/10) {
            .container {
                border: 1px solid #E2E8F0; border-radius: 12px;
                box-shadow: 0 2px 16px rgba(0,0,0,0.06);
                margin-top: 8px; margin-bottom: 8px;
                height: calc(100dvh - 16px); overflow: hidden;
            }
        }

        @media (max-aspect-ratio: 1/1) {
            .container { position: relative; }
            .site-section { position: absolute; inset: 0; }
            .chat-section { position: absolute; inset: 0; background: transparent; min-width: 0; }
        }
    </style>
</head>
<body>
    <div id="qabu-loader">
        <svg viewBox="-603 -603 1206 1206" xmlns="http://www.w3.org/2000/svg">
            <path fill="#fff" transform="rotate(135)" d="M -43.934 -600 L -43.934 0 C -102.948 -160.66 -102.944 -248.528 -175.736 -175.736 A 248.528 248.528 0 1 0 43.934 -244.614 L 43.934 -804.594 C 87.868 -512.132 248.528 -600 424.264 -424.264 A 600 600 0 1 1 -43.934 -600"/>
        </svg>
    </div>
    <div class="container" id="main">
        <div class="chat-section" id="chat-section"></div>
        <div class="site-section">
            <iframe id="site-frame" src="" title=""></iframe>
        </div>
    </div>
    <script src="loader.js"></script>
</body>
</html>
