<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Base reset and layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        .container { width: 100%; height: 100vh; height: 100dvh; display: flex; }

        /* Background section */
        .bg-section { flex: 1; height: 100%; position: relative; overflow: hidden; }
        .bg-section > img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Overlay on background (for branding) */
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: flex-end;
            flex-direction: column; gap: 60px; padding-bottom: 50px;
        }
        .bg-overlay:empty { display: none; }

        /* Content/widget section */
        .content { flex: 1; min-width: 300px; display: flex; align-items: center; justify-content: center; }

        /* Branding styles */
        .title {
            font-size: clamp(40px, 6vw, 100px);
            color: white;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            text-align: center;
        }
        .social-links { display: flex; gap: 20px; }
        .social-links a { opacity: 0.9; transition: opacity 0.2s; }
        .social-links a:hover { opacity: 1; }

        /* Narrow/portrait layout - stacked with transparent overlay */
        @media (max-aspect-ratio: 1/1) {
            .container { position: relative; }
            .bg-section { position: absolute; inset: 0; }
            .bg-overlay { display: none; }
            .content { position: absolute; inset: 0; background: transparent; min-width: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content" id="chat-container"></div>
        <div class="bg-section">
            <img id="bg-image" src="" alt="">
            <div class="bg-overlay" id="bg-overlay"></div>
        </div>
    </div>
    <script src="/loader.js"></script>
</body>
</html>
