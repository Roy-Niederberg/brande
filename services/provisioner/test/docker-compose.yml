services:
  mock-conductor:
    image: node:22-alpine
    volumes:
      - ./mock-conductor.js:/app/mock-conductor.js
      - conductor_sock:/run/qabu
    command: node /app/mock-conductor.js

  provisioner:
    build:
      context: ..
      target: development
    volumes:
      - ../src:/app/src:ro
      - conductor_sock:/run/qabu
    ports: ["4321:4321"]
    secrets: [provision_secret]
    depends_on: [mock-conductor]

volumes:
  conductor_sock:

secrets:
  provision_secret:
    environment: "${MY_SECRET_VAL:-dev}"
