<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qabu - Coming Soon</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Rubik', sans-serif;
            background: radial-gradient(circle at center, #F8F9FA 0%, #A6D0DD 30%, #3276AA 100%);
            color: #fff;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-top: auto;
            margin-bottom: 1rem;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #2C3E50;
        }

        h1 {
            font-size: 4rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-top: auto;
            color: transparent;
            -webkit-text-stroke: 2px #fff;
        }

        @media (max-width: 480px) {
            .logo {
                width: 140px;
            }
            .brand { font-size: 1.1rem; }
            h1 {
                font-size: 2.5rem;
                -webkit-text-stroke: 1.5px #fff;
            }
        }
    </style>
</head>
<body>
    <img src="/logo_dark.svg" alt="Qabu" class="logo">
    <p class="brand">Qab&ucirc;</p>
    <h1>Coming Soon</h1>
</body>
</html>
