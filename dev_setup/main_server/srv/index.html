<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qabu - Medical Services</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">qabu</div>
    </header>

    <div class="app-container">

        <main>
            <div class="content-width">
                <section class="hero">
                    <h1>איך אפשר לעזור?</h1>
                    <button id="toggleChat" class="chat-toggle-btn" aria-label="Toggle Chat"></button>
                </section>

                <section class="category-section">
                    <div class="category-label">בתי חולים</div>
                    <div class="carousel">
                        <button class="carousel-btn prev" aria-label="Previous">&lt;</button>
                        <div class="carousel-track">
                            <div class="card card-blue"><span>רמבם</span></div>
                            <div class="card card-teal"><span>איכילוב</span></div>
                            <div class="card card-purple"><span>לניאדו</span></div>
                            <div class="card card-orange"><span>שניידר</span></div>
                        </div>
                        <button class="carousel-btn next" aria-label="Next">&gt;</button>
                    </div>
                </section>

                <section class="category-section">
                    <div class="category-label">מרפאות</div>
                    <div class="carousel">
                        <button class="carousel-btn prev" aria-label="Previous">&lt;</button>
                        <div class="carousel-track">
                            <div class="card card-pink"><span>א.ר.ם</span></div>
                            <div class="card card-green"><span>ארד</span></div>
                            <div class="card card-indigo"><span>קליניקה</span></div>
                            <div class="card card-coral"><span>עיניים</span></div>
                        </div>
                        <button class="carousel-btn next" aria-label="Next">&gt;</button>
                    </div>
                </section>

                <section class="category-section">
                    <div class="category-label">רופאים</div>
                    <div class="carousel">
                        <button class="carousel-btn prev" aria-label="Previous">&lt;</button>
                        <div class="carousel-track">
                            <div class="card card-blue">
                                <div>
                                    <span>דר ליפו כץ</span>
                                    <span class="sub-text">עיניים</span>
                                </div>
                            </div>
                            <div class="card card-teal">
                                <div>
                                    <span>דר קורן ניר</span>
                                    <span class="sub-text">אאג</span>
                                </div>
                            </div>
                            <div class="card card-purple">
                                <div>
                                    <span>פרופ ברק שרון</span>
                                    <span class="sub-text">קרדיולוג</span>
                                </div>
                            </div>
                            <div class="card card-orange">
                                <div>
                                    <span>דר ליאת מנשה</span>
                                    <span class="sub-text">גניקולוגיה</span>
                                </div>
                            </div>
                        </div>
                        <button class="carousel-btn next" aria-label="Next">&gt;</button>
                    </div>
                </section>
            </div>
        </main>

        <aside class="chat-panel">
            <div class="chat-placeholder-text">צ'אט</div>
        </aside>

    </div>

    <script src="main.js"></script>
</body>
</html>
