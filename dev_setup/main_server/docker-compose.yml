services:
  web:
    image:   nginx:alpine
    ports:   ["9000:80"]
    volumes: [../../prod_setup/main_server/srv/:/usr/share/nginx/html:ro]

  facebook-dispatcher:
    build:   {context: ../../services/facebook_dispatcher/, target: development}
    ports:   ["3210:3210"]
    secrets: [fb_webhook_verify_token, fb_app_secret, fb_dispatcher_secret]
    volumes:
      - ../../services/facebook_dispatcher/src/:/app/src/
      - ../../prod_setup/main_server/data/page_routes.json:/app/data/page_routes.json:ro

  client-onboarding:
    build:   {context: ../../services/client_onboarding/, target: development}
    ports:   ["8559:4321"]
    secrets: [provision_secret, onboarding_emails]
    volumes:
      - ../../services/client_onboarding/src/:/app/src/

  auth:
    build:   {context: ../../services/auth/, target: development}
    ports:   ["9100:3456"]
    secrets: [jwt_signing_key, google_oauth]
    volumes:
      - ../../services/auth/src/:/app/src/

volumes:
  onboarding_data:

secrets:
  fb_webhook_verify_token: {file: ./secrets/fb_webhook_verify_token.secret}
  fb_app_secret:           {file: ./secrets/fb_app_secret.secret}
  fb_dispatcher_secret:    {file: ./secrets/fb_dispatcher_secret.secret}
  jwt_signing_key:         {file: ../../prod_setup/main_server/secrets/jwt_signing_key.secret}
  google_oauth:            {file: ../../prod_setup/main_server/secrets/google_oauth.secret}
  provision_secret:        {file: ../../prod_setup/client_server/clients_router/secrets/provision_secret.secret}
  onboarding_emails:       {file: ../../prod_setup/main_server/secrets/onboarding_emails.json}
