services:

  services_router:
    build: {context: ../../services/services_router/, target: development}
    ports: ["${HTTP_PORT:-3000}:80", "${HTTPS_PORT:-3443}:443", "${HTTPS_PORT:-3443}:443/udp"]
    volumes:
      - ../../services/services_router/src/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../prod_setup/client_server/${CLIENT}/assets/:/srv/assets:ro

  widget:
    build: {context: ../../services/widget/}
    volumes: [../../services/widget/widget.js:/srv/widget.js]

  site:
    build: {context: ../../services/site/, target: development}
    volumes:
      - ../../services/site/srv/:/site/
      - ../../services/site/src/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../prod_setup/client_server/${CLIENT}/assets/:/site/assets

  prompt-composer:
    build: {context: ../../services/prompt_composer/, target: development}
    environment: [NODE_TLS_REJECT_UNAUTHORIZED=0]
    secrets: [gemini_1, gemini_2, groq_1, groq_2, groq_3, admin_secret, authorized_emails]
    volumes:
      - ../../services/prompt_composer/src:/app/src:ro
      - ../../prod_setup/client_server/${CLIENT}/data/:/app/data

  admin:
    build: {context: ../../services/admin/, target: development}
    depends_on: [prompt-composer]
    secrets: [admin_secret, authorized_emails]
    volumes:
      - ../../services/admin/src/:/app/src/
      - ../../services/admin/src/views:/app/views
      - ../../prod_setup/client_server/${CLIENT}/assets/:/app/assets:ro
      - ../../prod_setup/client_server/${CLIENT}/data/:/app/data

  auth:
    build: {context: ../../services/auth/, target: development}
    environment:
      - OAUTH_CALLBACK=http://localhost:${HTTP_PORT:-3000}/auth/callback
      - COOKIE_DOMAIN=localhost
      - COOKIE_SECURE=false
      - ALLOWED_HOSTS=localhost,qabu.net
    secrets: [jwt_signing_key, google_oauth]
    volumes:
      - ../../services/auth/src:/app/src:ro

  auth-verifier:
    build: {context: ../../services/auth_verifier/, target: development}
    secrets: [jwt_signing_key]
    volumes:
      - ../../services/auth_verifier/src:/app/src:ro

  mock-facebook:
    build: {context: ../../services/mock_facebook/, target: development}
    volumes:
      - ../../services/mock_facebook/src/:/app/src/
      - ../../prod_setup/client_server/${CLIENT}/assets/mock_facebook/:/app/data/

