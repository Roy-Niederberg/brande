services:

  gateway:
    image: caddy:2.10.2-alpine
    ports: ["${HTTP_PORT:-3000}:80", "${HTTPS_PORT:-3443}:443", "${HTTPS_PORT:-3443}:443/udp"]
    volumes:
      - ../../prod_setup/client_server/${CLIENT}/gateway/Caddyfile:/etc/caddy/Caddyfile:ro

  site:
    build: {context: ../../services/site/, target: development}
    volumes:
      - ../../services/site/srv/:/site/
      - ../../services/site/src/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../prod_setup/client_server/${CLIENT}/assets/:/site/assets
      - ../../prod_setup/client_server/shared/widget/widget.js:/site/widget.js

  prompt-composer:
    build: {context: ../../services/prompt_composer/, target: development}
    environment: [NODE_TLS_REJECT_UNAUTHORIZED=0]
    secrets: [gemini_1, gemini_2, groq_1, groq_2]
    volumes:
      - ../../services/prompt_composer/src:/app/src:ro
      - ../../prod_setup/client_server/${CLIENT}/data/:/app/data

  admin:
    build: {context: ../../services/admin/, target: development}
    depends_on: [prompt-composer]
    volumes:
      - ../../services/admin/src/:/app/src/
      - ../../services/admin/src/views:/app/views
      - ../../prod_setup/client_server/${CLIENT}/assets/:/app/assets:ro
      - ../../prod_setup/client_server/shared/widget/widget.js:/app/public/widget.js:ro

  mock-facebook:
    build: {context: ../../services/mock_facebook/, target: development}
    volumes:
      - ../../services/mock_facebook/src/:/app/src/
      - ../../prod_setup/client_server/${CLIENT}/assets/mock_facebook/:/app/data/

